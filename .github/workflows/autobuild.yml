name: Autobuild

on:
  workflow_call:
    inputs:
      tag:
        type: string
        description: 'Tag of the release to build'
        required: true
      name:
        type: string
        description: 'Name of the release to build'
        required: true
      body:
        type: string
        description: 'Body of the release to build'
        required: true
      pre_release:
        type: boolean
        description: 'Is the release a pre-release'
        required: true
        default: false

jobs:
  create_release:
    runs-on: ubuntu-latest

    outputs:
      upload_url: ${{ steps.create_release.outputs.upload_url }}

    steps:
      - name: Create Release
        id: create_release
        uses: actions/create-release@v1
        with:
          tag_name: ${{ inputs.tag }}
          release_name: ${{ inputs.name }}
          body: ${{ inputs.body }}
          draft: false
          prerelease: ${{ inputs.pre_release }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  build_linux:
    runs-on: ubuntu-latest
    needs: create_release
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Restore Cache
        id: cache-restore
        uses: actions/cache/restore@v3
        with:
          path: |
            build/src
            build/build_linux
            build/build_dep_linux
          key: cache-linux

      - name: Build
        run: docker compose -f autobuild/compose_linux.yml up --build --user root 

      - name: Save Cache
        if: always()
        id: cache-save
        uses: actions/cache/save@v3
        with:
          path: |
            build/src
            build/build_linux
            build/build_dep_linux
          key: cache-linux
          

      - name: Upload Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.get_upload_url.outputs.upload_url }}
          asset_path: build/install/
          asset_name: PrusaSlicer-Linux-x64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
  
  build_windows:
    runs-on: windows-latest
    needs: create_release
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Restore Cache
        id: cache-restore
        uses: actions/cache/restore@v3
        with:
          path: |
            build/src
            build/build_windows
            build/build_dep_windows
          key: cache-windows

      - name: Build
        run: docker compose -f autobuild/compose_windows.yml up --build

      - name: Save Cache
        if: always()
        id: cache-save
        uses: actions/cache/save@v3
        with:
          path: |
            build/src
            build/build_windows
            build/build_dep_windows
          key: cache-windows

      - name: Upload Release
        uses: actions/upload-release-asset@v1
        with:
          upload_url: ${{ steps.get_upload_url.outputs.upload_url }}
          asset_path: /build/install/
          asset_name: PrusaSlicer-Windows-x64.zip
          asset_content_type: application/zip
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}