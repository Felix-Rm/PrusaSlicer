# Print profiles for the Elegoo printers.

[vendor]
repo_id = non-prusa-sla
# Vendor name will be shown by the Config Wizard.
name = Elegoo SLA
# Configuration version of this file. Config file will only be installed, if the config_version differs.
# This means, the server may force the PrusaSlicer configuration to be downgraded.
config_version = 1.0.0
# Where to get the updates from?
config_update_url = 

# The printer models will be shown by the Configuration Wizard in this order,
# also the first model installed & the first nozzle installed will be activated after install.
# Printer model name will be shown by the installation wizard.

[printer_model:MARS 4 9K]
name = Mars 4 9K (Experimental)
variants = default
technology = SLA
family = MARS 4
default_materials = Generic Blue Resin @MARS 0.05

[printer_model:MARS 4 DLP]
name = Mars 4 DLP (Experimental)
variants = default
technology = SLA
family = MARS 4
default_materials = Generic Blue Resin @MARS 0.05

[printer_model:MARS 4 MAX 6K]
name = Mars 4 Max 6K (Experimental)
variants = default
technology = SLA
family = MARS 4
default_materials = Generic Blue Resin @MARS 0.05

[printer_model:MARS 4 ULTRA 9K]
name = Mars 4 Ultra 9K (Experimental)
variants = default
technology = SLA
family = MARS 4
default_materials = Generic Blue Resin @MARS 0.05

[printer_model:SATURN 3 ULTRA]
name = Saturn 3 Ultra (Experimental)
variants = default
technology = SLA
family = SATURN 3
default_materials = Generic Blue Resin @SATURN 0.05

## SLA printers

[sla_print:*common print ELEGOO SLA*]
compatible_printers_condition = printer_notes=~/.*VENDOR_ELEGOO.*/ and printer_notes=~/.*SLA.*/ 
layer_height = 0.05
pad_edge_radius = 0.5
pad_enable = 1
pad_max_merge_distance = 50
pad_wall_height = 0
pad_wall_thickness = 1
pad_wall_slope = 45
faded_layers = 8
slice_closing_radius = 0.005
support_base_diameter = 3
support_base_height = 1
support_critical_angle = 45
support_density_at_45 = 250
support_density_at_horizontal = 500
support_head_front_diameter = 0.4
support_head_penetration = 0.4
support_head_width = 3
support_max_bridge_length = 10
support_minimal_z = 0
support_object_elevation = 5
support_pillar_diameter = 1
support_pillar_connection_mode = zigzag
support_pillar_widening_factor = 0
supports_enable = 1
support_small_pillar_diameter_percent = 60%

[sla_print:0.05 Normal @ELEGOO ABSTRACT]
inherits = *common print ELEGOO SLA*
compatible_printers_condition = printer_notes=~/.*ABSTRACT_ONLY.*/
layer_height = 0.05

[sla_print:0.05 Normal @ELEGOO MARS 4 9K]
inherits = 0.05 Normal @ELEGOO ABSTRACT
compatible_printers_condition = printer_notes=~/.*MARS49K\n.*/
output_filename_format = [input_filename_base].goo

[sla_print:0.05 Normal @ELEGOO MARS 4 DLP]
inherits = 0.05 Normal @ELEGOO ABSTRACT
compatible_printers_condition = printer_notes=~/.*MARS4DLP\n.*/
output_filename_format = [input_filename_base].goo

[sla_print:0.05 Normal @ELEGOO MARS 4 MAX 6K]
inherits = 0.05 Normal @ELEGOO ABSTRACT
compatible_printers_condition = printer_notes=~/.*MARS4MAX6K\n.*/
output_filename_format = [input_filename_base].goo

[sla_print:0.05 Normal @ELEGOO MARS 4 ULTRA 9K]
inherits = 0.05 Normal @ELEGOO ABSTRACT
compatible_printers_condition = printer_notes=~/.*MARS4ULTRA9k\n.*/
output_filename_format = [input_filename_base].goo

## SLA materials

[sla_material:*common ELEGOO SLA*]
compatible_printers_condition = printer_notes=~/.*VENDOR_ELEGOO.*/ and printer_notes=~/.*SLA.*/ 
compatible_prints_condition = layer_height == 0.05
exposure_time = 7
initial_exposure_time = 40
initial_layer_height = 0.05
material_correction = 1,1,1
material_notes = #Distances are defined in mm, speeds are defined in mm/s.\n#Delay is defined in s.\nLIFT_DISTANCE=8.0\nLIFT_SPEED=2.5\nRETRACT_SPEED=3.0\nBOTTOM_LIFT_SPEED=2.0\nBOTTOM_LIFT_DISTANCE=9.0\nDELAY_BEFORE_EXPOSURE=0.5\nANTIALIASING=1

[sla_material:*common 0.05 ELEGOO SLA*]
inherits = *common ELEGOO SLA*

[sla_material:Generic Blue Resin @MARS 0.05]
inherits = *common 0.05 ELEGOO SLA*
exposure_time = 10
initial_exposure_time = 40
material_type = Tough
material_vendor = Generic
material_colour = #6080EC
compatible_printers_condition = printer_notes=~/.*MARS.*/ and printer_notes=~/.*VENDOR_ELEGOO.*/ and printer_notes=~/.*SLA.*/ 

[sla_material:Generic Blue Resin @SATURN 0.05]
inherits = *common 0.05 ELEGOO SLA*
exposure_time = 10
initial_exposure_time = 40
material_type = Tough
material_vendor = Generic
material_colour = #6080EC
compatible_printers_condition = printer_notes=~/.*SATURN.*/ and printer_notes=~/.*VENDOR_ELEGOO.*/ and printer_notes=~/.*SLA.*/ 

